<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countryballs 35 Saniyelik Savaş Animasyonu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen">
        <h1>Countryballs: Savaşın Eşiği</h1>
        <p>35 Saniyelik Özel Animasyon</p>
        <button id="start-btn">Savaşı Başlat</button>
    </div>

    <div id="animation-container">
        <div id="sky">
            <div class="cloud cloud1"></div>
            <div class="cloud cloud2"></div>
        </div>
        <div id="ground"></div>
        
        <div id="turkey" class="countryball turkey">
            <div class="turkey-crescent"></div>
            <div class="turkey-star">★</div>
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="dialogue" id="turkey-dialogue"></div>
        </div>

        <div id="azerbaijan" class="countryball azerbaijan">
            <div class="aze-crescent"></div>
            <div class="aze-star">★</div>
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="dialogue" id="aze-dialogue"></div>
        </div>
        
        <div id="israel" class="countryball israel">
            <div class="israel-star">✡</div>
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="dialogue" id="israel-dialogue"></div>
        </div>

        <div id="america" class="countryball america">
            <div class="america-canton">★ ★</br>★ ★</div>
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="dialogue" id="america-dialogue"></div>
        </div>

        <div id="germany" class="countryball germany">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="dialogue" id="germany-dialogue"></div>
        </div>

        <div id="clash-effect">BOOM!</div>

        <div id="the-end">
            <h2>SAVAŞ SONA ERDİ</h2>
            <p>İzlediğiniz için teşekkürler!</p>
            <button id="restart-btn">Tekrar İzle</button>
        </div>
        <div id="timer-bar"><div id="timer-progress"></div></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
