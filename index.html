<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countryballs 20 Saniyelik Animasyon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen">
        <h1>Countryballs Macerası</h1>
        <p>20 Saniyelik Kısa Animasyon</p>
        <button id="start-btn">Animasyonu Başlat</button>
    </div>

    <div id="animation-container">
        <div id="sky">
            <div class="cloud cloud1"></div>
            <div class="cloud cloud2"></div>
            <div class="cloud cloud3"></div>
        </div>
        <div id="ground"></div>
        
        <div id="germany" class="countryball germany">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="dialogue" id="germany-dialogue"></div>
        </div>

        <div id="turkey" class="countryball turkey">
            <div class="turkey-crescent"></div>
            <div class="turkey-star">★</div>
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="dialogue" id="turkey-dialogue"></div>
        </div>
        
        <div id="poland" class="countryball poland">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="dialogue" id="poland-dialogue"></div>
        </div>

        <div id="the-end">
            <h2>SON</h2>
            <p>İzlediğiniz için teşekkürler!</p>
            <button id="restart-btn">Tekrar İzle</button>
        </div>
        <div id="timer-bar"><div id="timer-progress"></div></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
