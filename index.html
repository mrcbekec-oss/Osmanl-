<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20 Dakikalık Dünya Haritası Savaş Simülasyonu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen">
        <h1>Küresel Savaş Simülatörü</h1>
        <p>Dünya Haritası Üzerinde Kesintisiz 20 Dakikalık Çatışma Döngüsü</p>
        <button id="start-btn">Simülasyonu Başlat</button>
    </div>

    <div id="simulation-container">
        <!-- Harita arkaplanı -->
        <div id="map-layer"></div>
        <!-- Karakterler (Ordular) -->
        <div id="entities-layer"></div>
        <!-- Füzeler ve Atışlar -->
        <div id="projectiles-layer"></div>
        
        <!-- Yüzen UI Arayüzü -->
        <div id="ui-layer">
            <div class="ui-panel">
                <div id="timer-box">Savaş Süresi: <span>20:00</span></div>
                <div id="war-log"></div>
            </div>
        </div>
        
        <div id="the-end">
            <h2>SİMÜLASYON TAMAMLANDI</h2>
            <p>20 dakikalık savaş bitti.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
